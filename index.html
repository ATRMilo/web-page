<!DOCTYPE html>
<html lang="es">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>A Tu Ritmo Idiomas - En Construcción</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap"
        rel="stylesheet">

    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Poppins', sans-serif;
            background: #8B0000;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            color: #F9F9F9;
            overflow: hidden;
            position: relative;
        }

        /* Fondo decorativo */
        body::before {
            content: '';
            position: absolute;
            width: 600px;
            height: 600px;
            background: rgba(255, 255, 255, 0.03);
            border-radius: 50%;
            top: -200px;
            right: -200px;
        }

        body::after {
            content: '';
            position: absolute;
            width: 400px;
            height: 400px;
            background: rgba(0, 0, 0, 0.08);
            border-radius: 50%;
            bottom: -150px;
            left: -150px;
        }

        .container {
            text-align: center;
            padding: 40px 20px;
            position: relative;
            z-index: 2;
            max-width: 700px;
        }

        .logo {
            margin-bottom: 40px;
        }

        .logo img {
            width: 180px;
            max-width: 100%;
            filter: drop-shadow(0 10px 20px rgba(0, 0, 0, 0.25));
        }

        h1 {
            font-size: 3rem;
            font-weight: 700;
            margin-bottom: 20px;
            line-height: 1.2;
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            color: rgba(249, 249, 249, 0.9);
            line-height: 1.7;
            max-width: 600px;
            margin: 0 auto;
        }

        .divider {
            width: 80px;
            height: 4px;
            background: #F9F9F9;
            margin: 30px auto;
            border-radius: 50px;
            opacity: 0.9;
        }

        .footer {
            margin-top: 50px;
            font-size: 0.9rem;
            color: rgba(249, 249, 249, 0.7);
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 2.2rem;
            }

            p {
                font-size: 1rem;
            }

            .logo img {
                width: 140px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="logo">
            <img src="img/logo/atr-logo.png" alt="A Tu Ritmo Idiomas">
        </div>

        <h1>Sitio en Construcción</h1>

        <div class="divider"></div>

        <p>
            Estamos trabajando para brindarte una experiencia moderna,
            dinámica y a tu ritmo. Muy pronto encontrarás aquí todo lo
            relacionado con nuestros cursos y servicios.
        </p>

        <div class="footer">
            © 2026 A Tu Ritmo Idiomas. Todos los derechos reservados.
        </div>

    </div>

</body>

</html>
